<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">

  <!-- Fond rond navy -->
  <circle cx="130" cy="130" r="125" fill="#0B2D6B"/>

  <!-- Cercle extérieur -->
  <circle cx="130" cy="130" r="110" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.9"/>
  <!-- Cercle intérieur léger -->
  <circle cx="130" cy="130" r="97" fill="none" stroke="#FFFFFF" stroke-width="0.7" opacity="0.22"/>

  <!-- Axe fantôme -->
  <line x1="30" y1="130" x2="230" y2="130" stroke="#FFFFFF" stroke-width="0.7" opacity="0.12"/>

  <!-- Demi-cercles -->
  <path d="M 55 130 A 75 75 0 0 1 205 130" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.85"/>
  <path d="M 55 130 A 75 75 0 0 0 205 130" fill="none" stroke="#FFFFFF" stroke-width="2.2" opacity="0.85"/>

  <!-- Losange -->
  <polygon points="130,100 148,130 130,160 112,130" fill="none" stroke="#FFFFFF" stroke-width="1.8" opacity="0.85"/>

  <!-- Trait rouge -->
  <line x1="55" y1="130" x2="205" y2="130" stroke="#E8394D" stroke-width="3" stroke-linecap="round"/>

  <!-- Nœuds -->
  <circle cx="55"  cy="130" r="5.5" fill="#FFFFFF"/>
  <circle cx="205" cy="130" r="5.5" fill="#E8394D"/>
  <circle cx="130" cy="130" r="5"   fill="none" stroke="#FFFFFF" stroke-width="2.2"/>

  <!-- Accents dorés -->
  <line x1="112" y1="113" x2="98"  y2="99"  stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="148" y1="113" x2="162" y2="99"  stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="112" y1="147" x2="98"  y2="161" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="148" y1="147" x2="162" y2="161" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>

</svg>
