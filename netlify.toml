[build]
  command = "npm run build"
  publish = "dist"

# Pour React Router (SPA) : rediriger toutes les routes inconnues vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers optionnels (sécurité basique + cache pour les assets)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
